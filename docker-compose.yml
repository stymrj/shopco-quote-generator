services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    expose:
      - "5002"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/shopco_quote_task
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
